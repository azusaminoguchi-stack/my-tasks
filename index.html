<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="My Tasks">
<title>My Tasks ✅</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f7;
    --bg3: #ececec;
    --text: #1a1a1a;
    --text2: #555;
    --text3: #999;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --radius: 16px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --bg2: #2c2c2e;
      --bg3: #3a3a3c;
      --text: #f2f2f7;
      --text2: #aeaeb2;
      --text3: #636366;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'M PLUS Rounded 1c', -apple-system, sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }

  .app { max-width: 680px; margin: 0 auto; padding: 0 0 80px; }

  /* header */
  .header { text-align: center; padding: 28px 16px 16px; }
  .header h1 { font-size: 24px; font-weight: 700; }
  .header p { font-size: 13px; color: var(--text3); margin-top: 2px; }

  /* tabs */
  .tabs-wrap { padding: 0 12px 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tabs { display: flex; gap: 6px; padding-bottom: 4px; width: max-content; }
  .tab { padding: 7px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer; border: 2px solid transparent; transition: all 0.18s; background: var(--bg3); color: var(--text2); white-space: nowrap; user-select: none; }
  .tab:hover { transform: translateY(-1px); }
  .tab.active { transform: translateY(-2px); }
  .tab[data-cat="all"].active    { background:#f8e8ff; color:#7c3aed; border-color:#c4b5fd; box-shadow:0 3px 0 #c4b5fd; }
  .tab[data-cat="cheers"].active { background:#d1fae5; color:#065f46; border-color:#6ee7b7; box-shadow:0 3px 0 #6ee7b7; }
  .tab[data-cat="houjitsu"].active{ background:#dbeafe; color:#1e40af; border-color:#93c5fd; box-shadow:0 3px 0 #93c5fd; }
  .tab[data-cat="bng"].active    { background:#e0f2fe; color:#075985; border-color:#7dd3fc; box-shadow:0 3px 0 #7dd3fc; }
  .tab[data-cat="other"].active  { background:#fef3c7; color:#92400e; border-color:#fcd34d; box-shadow:0 3px 0 #fcd34d; }
  .tab[data-cat="private"].active{ background:#fee2e2; color:#991b1b; border-color:#fca5a5; box-shadow:0 3px 0 #fca5a5; }

  /* input card */
  .input-card { margin: 12px; background: var(--bg); border-radius: 20px; padding: 14px 16px; box-shadow: var(--shadow); }
  .text-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .text-row input { flex: 1; padding: 10px 14px; border: 2px solid var(--border); border-radius: 14px; font-size: 15px; font-family: inherit; background: var(--bg2); color: var(--text); transition: border-color 0.15s; }
  .text-row input:focus { outline: none; border-color: #c4b5fd; }
  .text-row input::placeholder { color: var(--text3); }
  .mic-btn { width: 44px; height: 44px; border: 2px solid var(--border); border-radius: 50%; background: var(--bg2); cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
  .mic-btn:hover { border-color: #c4b5fd; background: #f8e8ff; }
  .mic-btn.recording { background: #fee2e2; border-color: #fca5a5; animation: pulse 0.8s infinite alternate; }
  @keyframes pulse { from { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } to { box-shadow: 0 0 0 8px rgba(239,68,68,0); } }
  .voice-hint { font-size: 11px; color: var(--text3); text-align: center; min-height: 16px; margin-bottom: 6px; }

  .meta-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .meta-label { font-size: 12px; color: var(--text3); font-weight: 700; white-space: nowrap; }
  .meta-row input[type="date"] { padding: 5px 10px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 12px; font-family: inherit; background: var(--bg2); color: var(--text); cursor: pointer; }
  .meta-row input[type="date"]:focus { outline: none; border-color: #c4b5fd; }
  .imp-btns { display: flex; gap: 4px; }
  .imp-btn { padding: 4px 10px; border-radius: 12px; border: 1.5px solid var(--border); font-size: 12px; font-weight: 700; cursor: pointer; background: var(--bg2); color: var(--text2); transition: all 0.15s; font-family: inherit; }
  .imp-btn.sel-low  { background:#d1fae5; color:#065f46; border-color:#6ee7b7; }
  .imp-btn.sel-mid  { background:#fef3c7; color:#92400e; border-color:#fcd34d; }
  .imp-btn.sel-high { background:#fee2e2; color:#991b1b; border-color:#fca5a5; }
  .add-btn { margin-left: auto; padding: 8px 18px; border: none; border-radius: 16px; background: linear-gradient(135deg, #a78bfa, #f472b6); color: white; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; box-shadow: 0 3px 0 #7c3aed; transition: all 0.15s; white-space: nowrap; }
  .add-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 0 #7c3aed; }
  .add-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 #7c3aed; }

  /* task list */
  .section-wrap { padding: 0 12px; margin-top: 8px; }
  .section-label { font-size: 12px; font-weight: 700; color: var(--text3); letter-spacing: 0.08em; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .section-label::after { content: ''; flex: 1; height: 1.5px; background: var(--border); border-radius: 1px; }

  .task-list { display: flex; flex-direction: column; gap: 8px; min-height: 40px; }
  .task-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; background: var(--bg); border: 2px solid var(--border); border-radius: var(--radius); transition: all 0.2s; animation: bounceIn 0.22s ease-out both; }
  .task-item:hover { border-color: var(--border2); transform: translateY(-1px); box-shadow: var(--shadow); }
  .task-item.completing { opacity: 0; transform: scale(0.92) translateY(-4px); }
  .task-item.urgent { border-color: #fca5a5 !important; background: #fff8f8; }
  .task-item.hot    { border-color: #fcd34d !important; background: #fffdf0; }
  @media (prefers-color-scheme: dark) {
    .task-item.urgent { background: #2d1a1a; }
    .task-item.hot    { background: #2a2510; }
  }

  .task-check { width: 24px; height: 24px; border: 2.5px solid var(--border2); border-radius: 50%; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; background: var(--bg2); margin-top: 1px; }
  .task-check:hover { border-color: #a78bfa; background: #f8e8ff; transform: scale(1.1); }
  .task-body { flex: 1; min-width: 0; }
  .task-text { font-size: 15px; color: var(--text); font-weight: 500; margin-bottom: 5px; word-break: break-all; }
  .task-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .meta-chip { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 700; }
  .chip-date          { background: var(--bg3); color: var(--text3); }
  .chip-deadline-ok   { background: #d1fae5; color: #065f46; }
  .chip-deadline-soon { background: #fef3c7; color: #92400e; }
  .chip-deadline-urg  { background: #fee2e2; color: #991b1b; }
  .chip-low  { background: #d1fae5; color: #065f46; }
  .chip-mid  { background: #fef3c7; color: #92400e; }
  .chip-high { background: #fee2e2; color: #991b1b; }
  .chip-cat  { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 700; }
  .pill-cheers   { background: #d1fae5; color: #065f46; }
  .pill-houjitsu { background: #dbeafe; color: #1e40af; }
  .pill-bng      { background: #e0f2fe; color: #075985; }
  .pill-other    { background: #fef3c7; color: #92400e; }
  .pill-private  { background: #fee2e2; color: #991b1b; }

  .task-del { opacity: 0; cursor: pointer; color: var(--text3); padding: 3px 6px; border-radius: 8px; transition: all 0.15s; font-size: 14px; margin-top: 1px; }
  .task-item:hover .task-del, .task-item:focus-within .task-del { opacity: 1; }
  .task-del:hover { color: #ef4444; background: #fee2e2; }

  /* divider */
  .divider { margin: 20px 12px; display: flex; align-items: center; gap: 8px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1.5px; background: var(--border); }

  /* archive */
  .archive-wrap { padding: 0 12px; }
  .archive-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; font-weight: 700; color: var(--text2); padding: 10px 14px; border: 2px dashed var(--border2); border-radius: 14px; transition: all 0.15s; user-select: none; }
  .archive-toggle:hover { background: var(--bg3); }
  .archive-toggle .arr { margin-left: auto; transition: transform 0.2s; }
  .archive-toggle.open .arr { transform: rotate(180deg); }
  .archive-count { font-size: 11px; font-weight: 700; background: var(--bg3); padding: 2px 8px; border-radius: 10px; }
  .archive-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .archive-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg3); border-radius: 14px; opacity: 0.7; }
  .archive-item .archive-text { font-size: 13px; text-decoration: line-through; color: var(--text2); flex: 1; word-break: break-all; }
  .arch-del { cursor: pointer; color: var(--text3); padding: 2px 6px; border-radius: 8px; font-size: 14px; }
  .arch-del:hover { color: #ef4444; background: #fee2e2; }

  .empty { font-size: 13px; color: var(--text3); padding: 20px 0; text-align: center; }

  @keyframes pop { 0%{opacity:1;transform:scale(0.5)translateY(0)} 100%{opacity:0;transform:scale(2)translateY(-30px)} }
  .confetti-pop { position: fixed; pointer-events: none; animation: pop 0.55s ease-out forwards; font-size: 18px; z-index: 9999; }
  @keyframes bounceIn { 0%{opacity:0;transform:scale(0.85)translateY(8px)} 60%{transform:scale(1.03)translateY(-2px)} 100%{opacity:1;transform:scale(1)translateY(0)} }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>✅ My Tasks</h1>
    <p>今日もがんばろう！</p>
  </div>

  <div class="tabs-wrap">
    <div class="tabs" id="tabs">
      <div class="tab active" data-cat="all">🌈 すべて</div>
      <div class="tab" data-cat="cheers">📣 CHEERS</div>
      <div class="tab" data-cat="houjitsu">📰 房日新聞</div>
      <div class="tab" data-cat="bng">🩵 BNG</div>
      <div class="tab" data-cat="other">📍 その他</div>
      <div class="tab" data-cat="private">🏠 プライベート</div>
    </div>
  </div>

  <div class="input-card">
    <div class="text-row">
      <input type="text" id="task-input" placeholder="やることを入力してね…" />
      <button class="mic-btn" id="mic-btn" onclick="toggleVoice()" title="音声入力">🎤</button>
    </div>
    <div class="voice-hint" id="voice-hint"></div>
    <div class="meta-row">
      <span class="meta-label">締切</span>
      <input type="date" id="deadline-input" />
      <span class="meta-label">重要度</span>
      <div class="imp-btns">
        <button class="imp-btn" data-imp="low" onclick="setImp('low')">低</button>
        <button class="imp-btn" data-imp="mid" onclick="setImp('mid')">中</button>
        <button class="imp-btn sel-high" data-imp="high" onclick="setImp('high')">高</button>
      </div>
      <button class="add-btn" onclick="addTask()">＋ 追加</button>
    </div>
  </div>

  <div class="section-wrap" style="margin-top:16px;">
    <div class="section-label">やること</div>
    <div class="task-list" id="task-list"></div>
  </div>

  <div class="divider"><span>🗂</span></div>

  <div class="archive-wrap">
    <div class="archive-toggle" id="archive-toggle" onclick="toggleArchive()">
      <span>🎉</span>
      <span>やったこと</span>
      <span class="archive-count" id="archive-count">0</span>
      <span class="arr">▾</span>
    </div>
    <div class="archive-list" id="archive-list" style="display:none;"></div>
  </div>
</div>

<script>
const CATS = { cheers:'CHEERS', houjitsu:'房日新聞', bng:'BNG', other:'その他', private:'プライベート' };
const ICONS = { cheers:'📣', houjitsu:'📰', bng:'🩵', other:'📍', private:'🏠' };
let currentCat = 'all', archiveOpen = false, currentImp = 'high';
let recognition = null, isRecording = false;

const load = (k, d) => { try { return JSON.parse(localStorage.getItem(k)) || d; } catch { return d; } };
const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));

let tasks = load('mytasks_v1', []);
let archive = load('mytasks_archive_v1', []);

const today = () => new Date().toISOString().slice(0, 10);

function daysLeft(dl) {
  if (!dl) return null;
  return Math.ceil((new Date(dl) - new Date(today())) / 86400000);
}

function scoreTask(t) {
  const imp = { low:1, mid:2, high:3 }[t.importance || 'mid'] || 2;
  const dl = daysLeft(t.deadline);
  let urgency = 0;
  if (dl === null) urgency = 0;
  else if (dl <= 0) urgency = 100;
  else if (dl <= 1) urgency = 80;
  else if (dl <= 3) urgency = 50;
  else if (dl <= 7) urgency = 20;
  else urgency = 5;
  return urgency * 3 + imp * 10;
}

document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  currentCat = tab.dataset.cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === tab));
  render();
});

document.getElementById('task-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

function setImp(val) {
  currentImp = val;
  document.querySelectorAll('.imp-btn').forEach(b => {
    b.className = 'imp-btn' + (b.dataset.imp === val ? ' sel-' + val : '');
  });
}

function addTask() {
  const inp = document.getElementById('task-input');
  const text = inp.value.trim();
  if (!text) return;
  const cat = currentCat === 'all' ? 'other' : currentCat;
  const deadline = document.getElementById('deadline-input').value || null;
  tasks.push({ id: Date.now(), text, cat, importance: currentImp, deadline, createdAt: today() });
  save('mytasks_v1', tasks);
  inp.value = '';
  render();
}

function toggleVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('voice-hint').textContent = 'このブラウザは音声入力に対応していません';
    return;
  }
  if (isRecording) { stopVoice(); return; }
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('mic-btn').textContent = '🔴';
    document.getElementById('voice-hint').textContent = '🎤 聞いてるよ…話してね！';
  };
  recognition.onresult = e => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    document.getElementById('task-input').value = final || interim;
    if (final) document.getElementById('voice-hint').textContent = '✅ 認識完了！確認して追加してね';
  };
  recognition.onerror = () => { stopVoice(); document.getElementById('voice-hint').textContent = 'もう一度試してね'; };
  recognition.onend = () => stopVoice();
  recognition.start();
}

function stopVoice() {
  if (recognition) recognition.stop();
  isRecording = false;
  const btn = document.getElementById('mic-btn');
  btn.classList.remove('recording');
  btn.textContent = '🎤';
}

function completeTask(id) {
  const el = document.querySelector(`[data-id="${id}"]`);
  const t = tasks.find(t => t.id === id);
  if (!el) return;
  showPop(el);
  el.classList.add('completing');
  setTimeout(() => {
    tasks = tasks.filter(t => t.id !== id);
    if (t) archive.unshift({ ...t, archivedAt: today() });
    save('mytasks_v1', tasks);
    save('mytasks_archive_v1', archive);
    render();
  }, 280);
}

function showPop(el) {
  const rect = el.getBoundingClientRect();
  ['🌟','✨','⭐','🎉'].forEach((em, i) => {
    const s = document.createElement('span');
    s.className = 'confetti-pop';
    s.textContent = em;
    s.style.cssText = `left:${rect.left + rect.width/2 + (i-1.5)*22}px;top:${rect.top + window.scrollY + 4}px;`;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 600);
  });
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save('mytasks_v1', tasks);
  render();
}

function deleteArchive(id) {
  archive = archive.filter(a => a.id !== id);
  save('mytasks_archive_v1', archive);
  renderArchive();
}

function toggleArchive() {
  archiveOpen = !archiveOpen;
  document.getElementById('archive-list').style.display = archiveOpen ? 'flex' : 'none';
  document.getElementById('archive-list').style.flexDirection = 'column';
  document.getElementById('archive-list').style.gap = '6px';
  document.getElementById('archive-toggle').classList.toggle('open', archiveOpen);
  if (archiveOpen) renderArchive();
}

const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function deadlineChip(dl) {
  if (!dl) return '';
  const d = daysLeft(dl);
  if (d <= 0)  return `<span class="meta-chip chip-deadline-urg">⚠️ 期限切れ</span>`;
  if (d <= 2)  return `<span class="meta-chip chip-deadline-urg">🔥 あと${d}日</span>`;
  if (d <= 7)  return `<span class="meta-chip chip-deadline-soon">⏰ あと${d}日</span>`;
  return `<span class="meta-chip chip-deadline-ok">📅 ${dl}</span>`;
}

function impChip(imp) {
  const map = { low:['chip-low','🟢 低'], mid:['chip-mid','🟡 中'], high:['chip-high','🔴 高'] };
  const [cls, label] = map[imp || 'mid'] || map.mid;
  return `<span class="meta-chip ${cls}">${label}</span>`;
}

function urgencyClass(t) {
  const s = scoreTask(t);
  if (s >= 130) return 'urgent';
  if (s >= 80) return 'hot';
  return '';
}

function render() {
  const list = document.getElementById('task-list');
  let filtered = currentCat === 'all' ? [...tasks] : tasks.filter(t => t.cat === currentCat);
  filtered.sort((a, b) => scoreTask(b) - scoreTask(a));
  list.innerHTML = filtered.length === 0
    ? '<div class="empty">タスクなし！えらい🎊</div>'
    : filtered.map(t => `
      <div class="task-item ${urgencyClass(t)}" data-id="${t.id}">
        <div class="task-check" onclick="completeTask(${t.id})" title="完了！">
          <i class="ti ti-check" style="font-size:13px;color:#a78bfa;"></i>
        </div>
        <div class="task-body">
          <div class="task-text">${esc(t.text)}</div>
          <div class="task-meta">
            ${impChip(t.importance)}
            ${deadlineChip(t.deadline)}
            <span class="meta-chip chip-date">📝 ${t.createdAt || ''}</span>
            ${currentCat === 'all' ? `<span class="chip-cat pill-${t.cat}">${ICONS[t.cat] || ''} ${CATS[t.cat] || ''}</span>` : ''}
          </div>
        </div>
        <span class="task-del" onclick="deleteTask(${t.id})" title="削除">
          <i class="ti ti-x" style="font-size:14px"></i>
        </span>
      </div>`).join('');
  document.getElementById('archive-count').textContent = archive.length;
  if (archiveOpen) renderArchive();
}

function renderArchive() {
  const list = document.getElementById('archive-list');
  list.innerHTML = archive.length === 0
    ? '<div class="empty">まだ何もないよ</div>'
    : archive.slice(0, 50).map(a => `
      <div class="archive-item">
        <span style="font-size:16px;">✅</span>
        <span class="archive-text">${esc(a.text)}</span>
        <span class="chip-cat pill-${a.cat}" style="font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700;">${ICONS[a.cat] || ''} ${CATS[a.cat] || ''}</span>
        <span class="arch-del" onclick="deleteArchive(${a.id})" title="完全削除">
          <i class="ti ti-trash" style="font-size:14px"></i>
        </span>
      </div>`).join('');
}

render();
</script>
</body>
</html>
